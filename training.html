<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lothian Roller Derby</title>

  <meta name="robots" content="index,follow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <!-- Header -->
  <div id="header"></div>

  <section class="content-section">

    <article class="content-card">
      <h2 class="content-title">Training</h2>

      <p>
        We train twice weekly. More info idk<br>
        <a href="contact-us.html" class="cta-button">
         Contact us to join
        </a>
      </p>
    </article>

    <!-- Wednesday Training -->
    <article class="content-card">
      <div class="content-grid">

        <div class="training-info">

          <div class="content-title">
            Wednesdays
          </div>

          <div class="content-title">
            19:30–21:30
          </div>

          <div class="training-address">
            <strong>Dalkeith Community Leisure</strong>
            4 Cousland Rd<br>
            Dalkeith<br>
            EH22 2PS
          </div>

        </div>

        <div class="map-container">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2236.76356801245!2d-3.0481897228025296!3d55.90145958053085!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4887bbf905a46b7d%3A0x7f93a262c90a52ab!2sDalkeith%20Community%20Leisure!5e0!3m2!1sen!2suk!4v1780938894882!5m2!1sen!2suk"
            allowfullscreen
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>

      </div>
    </article>

    <!-- Friday Training -->
    <article class="content-card">
      <div class="content-grid">

        <div class="training-info">

          <div class="content-title">
            Fridays
          </div>

          <div class="content-title">
            19:00–21:00
          </div>

          <div class="training-address">
            <strong>Galleon Sports Centre</strong>
            Colinton Rd<br>
            Edinburgh<br>
            EH10 5EG
          </div>

        </div>

        <div class="map-container">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2235.1363656133713!2d-3.2215476228011934!3d55.929673878353725!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4887c7057c0b8b37%3A0x89b9d6d1a84e433f!2sGalleon%20Sports%20Centre!5e0!3m2!1sen!2suk!4v1780939663664!5m2!1sen!2suk"
            allowfullscreen
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>

      </div>
    </article>

  </section>

  <!-- Footer -->
  <div id="footer"></div>

  <script src="layout.js"></script>

</body>
</html>
